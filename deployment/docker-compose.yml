services:
  # ----------------------------------------------------------------
  # INFRASTRUCTURE
  # ----------------------------------------------------------------
  mongodb:
    image: mongo:6.0
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: password
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

  rabbitmq:
    image: rabbitmq:3-management
    restart: always
    environment:
      RABBITMQ_DEFAULT_USER: user
      RABBITMQ_DEFAULT_PASS: password
    ports:
      - "127.0.0.1:5672:5672"
      - "127.0.0.1:15672:15672"
    networks:
      - app-network

  # ----------------------------------------------------------------
  # BACKEND SERVICES
  # ----------------------------------------------------------------
  backend-api:
    build:
      context: ../
      dockerfile: deployment/Dockerfile.backend
    restart: always
    command: ["/app/api"]
    expose:
      - "8080"
    ports:
      - "8080:8080"
    # Reuse the development credentials in the project root. Compose otherwise
    # only auto-loads deployment/.env and leaves these values empty.
    env_file:
      - path: ../.env
        required: false
    environment:
      - MONGODB_URI=mongodb://root:password@mongodb:27017
      - MONGODB_DATABASE=social_feed
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672/
      - APP_PORT=8080
      - API_MODE=release
      - LOGGER_LEVEL=info
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - ENCRYPT_KEY=${ENCRYPT_KEY:-changemechangemechangemechangeme} # Must be 32 bytes
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - app-network

  backend-worker:
    build:
      context: ../
      dockerfile: deployment/Dockerfile.backend
    restart: always
    command: ["/app/worker"]
    env_file:
      - path: ../.env
        required: false
    environment:
      - MONGODB_URI=mongodb://root:password@mongodb:27017
      - MONGODB_DATABASE=social_feed
      - RABBITMQ_URL=amqp://user:password@rabbitmq:5672/
      - LOGGER_LEVEL=info
      - ENCRYPT_KEY=${ENCRYPT_KEY:-changemechangemechangemechangeme}
    depends_on:
      - mongodb
      - rabbitmq
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
